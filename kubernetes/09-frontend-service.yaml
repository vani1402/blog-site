apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: blog-site
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  # LoadBalancer works out of the box on cloud providers (AWS/GKE/Azure).
  # On minikube/local clusters without a cloud LB, change this to NodePort instead:
  #   type: NodePort
  #   ports:
  #     - port: 80
  #       targetPort: 80
  #       nodePort: 30080
  type: LoadBalancer
