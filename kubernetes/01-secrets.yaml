# NOTE: these are base64-encoded placeholder values for local/demo use.
# For real deployments, create this with `kubectl create secret generic` instead
# of committing plaintext-derived secrets to git.
#
# echo -n 'rootpass' | base64        -> cm9vdHBhc3M=
# echo -n 'blogdb' | base64          -> YmxvZ2Ri
# echo -n 'change_this_secret' | base64 -> Y2hhbmdlX3RoaXNfc2VjcmV0

apiVersion: v1
kind: Secret
metadata:
  name: blog-secrets
  namespace: blog-site
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3M=
  MYSQL_DATABASE: YmxvZ2Ri
  JWT_SECRET: Y2hhbmdlX3RoaXNfc2VjcmV0
